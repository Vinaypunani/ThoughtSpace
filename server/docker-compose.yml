version: '3.8'

services:
  api:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_started
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    environment:
      - PORT=${PORT:-3000}
    ports:
      - "${PORT:-3000}:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - api

volumes:
  redis_data:
